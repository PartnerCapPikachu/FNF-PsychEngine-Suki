# Builds Psych Engine (community fork) for Windows / Linux / macOS.

name: Build

on:
  workflow_dispatch:

jobs:
  buildLinux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Install system packages (VLC)
        run: |
          sudo apt-get update
          sudo apt-get install -y libvlc-dev libvlccore-dev

      - name: Install Haxe dependencies
        run: |
          haxelib setup ~/haxelib
          chmod +x ./setup/unix.sh
          ./setup/unix.sh

      - name: Create version tag
        run: echo "${{ github.run_id }}" > VERSION

      - name: Compile
        run: haxelib run lime build Project.xml linux --app-version="1.1.0-${{ github.run_id }}"

      - name: Publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: linuxBuild
          path: export/release/linux/bin

  buildWindows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Install Haxe dependencies
        shell: cmd
        run: |
          call .\setup\windows.bat

      - name: Create version tag
        shell: cmd
        run: echo ${{ github.run_id }}> VERSION

      - name: Compile
        shell: cmd
        env:
          HAXELIB_PATH: ${{ github.workspace }}\.haxelib\
        run: haxelib run lime build windows --app-version="1.1.0-${{ github.run_id }}"

      - name: Publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: windowsBuild
          path: export/release/windows/bin

  buildMac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Install Haxe dependencies
        run: |
          haxelib setup ~/haxelib
          chmod +x ./setup/unix.sh
          ./setup/unix.sh

      - name: Create version tag
        run: echo "${{ github.run_id }}" > VERSION

      - name: Compile
        run: haxelib run lime build mac --app-version="1.1.0-${{ github.run_id }}"

      - name: Publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: macBuild
          path: export/release/macos/bin
